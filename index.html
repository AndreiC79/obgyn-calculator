<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f4f8;min-height:100vh;display:flex}
.sidebar{width:230px;background:#1e293b;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;max-height:100vh;position:sticky;top:0}
.sidebar-brand{color:#fff;font-size:14px;font-weight:700;padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid #334155}
.sidebar-brand span{display:block;font-size:11px;font-weight:400;color:#64748b;margin-top:2px}
.section-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;padding:1rem 1.25rem 0.4rem}
.nav-item{display:flex;align-items:center;gap:9px;padding:0.55rem 1.25rem;cursor:pointer;border-left:3px solid transparent;color:#94a3b8;font-size:13px;transition:all 0.12s}
.nav-item:hover{background:#334155;color:#e2e8f0}
.nav-item.active{background:#1e40af18;border-left-color:var(--acc);color:#fff}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--acc)}
.main{flex:1;padding:1.75rem;overflow-y:auto}
.calc-header{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.calc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--acc-l)}
.calc-title{font-size:20px;font-weight:700;color:#1e293b}
.calc-sub{font-size:12px;color:#64748b;margin-top:3px}
.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:#94a3b8;margin-bottom:0.85rem}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:13px;font-weight:600;color:#475569}
.fg input,.fg select{padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;color:#1e293b;background:#f8fafc;width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--acc);background:#fff}
.hint{font-size:11px;color:#94a3b8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.85rem}
.btn{padding:9px 20px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:var(--acc);color:#fff;margin-top:0.25rem;transition:all 0.12s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.res{background:var(--acc-l);border-radius:12px;padding:1.1rem 1.4rem;margin-top:0.85rem;border-left:4px solid var(--acc)}
.res.hidden{display:none}
.res-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--acc);margin-bottom:3px}
.res-main{font-size:22px;font-weight:700;color:var(--acc-d)}
.res-note{font-size:13px;color:#475569;margin-top:7px;line-height:1.5}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.6rem;margin-top:0.7rem}
.res-item{background:#fff;border-radius:8px;padding:0.65rem;text-align:center}
.res-val{font-size:16px;font-weight:700;color:var(--acc-d)}
.res-lbl2{font-size:11px;color:#94a3b8;margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:5px}
.bg{background:#dcfce7;color:#166534}.by{background:#fef9c3;color:#854d0e}.bo{background:#ffedd5;color:#9a3412}.br{background:#fee2e2;color:#991b1b}.bb{background:#dbeafe;color:#1e40af}.bp{background:#fce7f3;color:#9d174d}
.chk-row{display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;padding:7px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc}
.chk-row input{width:15px;height:15px;accent-color:var(--acc)}
.divider{border:none;border-top:1.5px solid #f1f5f9;margin:0.85rem 0}
@media(max-width:600px){.sidebar{width:200px}.grid2,.grid3{grid-template-columns:1fr}}
</style>

<div class="sidebar" id="sidebar"></div>
<main class="main" id="main"></main>

<script>
const C={
  obs:[
    {id:'ga',acc:'#3b82f6',icon:'📅',name:'Vârstă gestațională & DPN',sub:'Calculează data probabilă a nașterii și vârsta gestațională'},
    {id:'efw',acc:'#8b5cf6',icon:'⚖️',name:'Greutate fetală estimată (EFW)',sub:'Formula Hadlock cu măsurători biometrice'},
    {id:'bishop',acc:'#10b981',icon:'📋',name:'Scor Bishop',sub:'Evaluarea colului uterin pentru inducerea travaliului'},
    {id:'bpp',acc:'#06b6d4',icon:'🔊',name:'Profil biofizic (Manning)',sub:'Scorul Manning cu 5 parametri'},
    {id:'afi',acc:'#0ea5e9',icon:'💧',name:'Indicele lichidului amniotic (ILA)',sub:'Calculul ILA din 4 cadrane'},
    {id:'vbac',acc:'#f59e0b',icon:'🏥',name:'Calculator VBAC (Grobman)',sub:'Probabilitatea nașterii vaginale după cezariană'},
    {id:'hellp',acc:'#ef4444',icon:'🩺',name:'Scor HELLP',sub:'Criterii pentru sindromul HELLP'},
    {id:'shock',acc:'#dc2626',icon:'❤️',name:'Indice de șoc',sub:'Shock Index și qSOFA / SOFA'},
    {id:'pph',acc:'#e11d48',icon:'🩸',name:'Risc hemoragie postpartum',sub:'Stratificare ACOG/CMQCC pre-naștere'},
    {id:'preeclampsia',acc:'#7c3aed',icon:'🧠',name:'Risc preeclampsie',sub:'Calculator risc primul trimestru (FMF-based)'},
    {id:'mgso4',acc:'#0d9488',icon:'💊',name:'Dozare Sulfat de Magneziu',sub:'Doze pentru preeclampsie severă și neuroprotecție'},
    {id:'csrisk',acc:'#b45309',icon:'🔪',name:'Risc operație cezariană',sub:'Probabilitate cezariană în travaliu'},
    {id:'twin',acc:'#7e22ce',icon:'👶',name:'Sarcina gemelară',sub:'Calculatoare specifice sarcinii gemelare'},
  ],
  gyn:[
    {id:'rmi',acc:'#ec4899',icon:'🔬',name:'RMI – Indice risc malignitate',sub:'Masă ovariană: RMI I și RMI II'},
    {id:'roma',acc:'#db2777',icon:'🧪',name:'Scor ROMA',sub:'HE4 + CA125 – risc cancer ovarian'},
    {id:'bmi',acc:'#16a34a',icon:'📊',name:'IMC & Suprafață corporală',sub:'Body Mass Index și Body Surface Area'},
    {id:'menopause',acc:'#f97316',icon:'🌡️',name:'Scor simptome menopauză',sub:'Menopause Rating Scale (MRS)'},
    {id:'endoca',acc:'#9333ea',icon:'🏥',name:'Risc cancer endometrial',sub:'Factori de risc pentru cancerul de endometru'},
    {id:'ovres',acc:'#0891b2',icon:'🥚',name:'Rezervă ovariană',sub:'AMH, FSH, AFC – interpretare'},
    {id:'rasrm',acc:'#dc2626',icon:'🔴',name:'Scor rASRM endometrioză',sub:'Clasificarea revizuită ASRM a endometriozei'},
    {id:'enzian',acc:'#be185d',icon:'🔬',name:'Scor Enzian (DIE)',sub:'Endometrioză profundă – clasificare pe compartimente'},
    {id:'pbac',acc:'#92400e',icon:'🩸',name:'Scor PBAC',sub:'Estimarea pierderilor menstruale'},
    {id:'ecog',acc:'#1d4ed8',icon:'🚶',name:'Status performanță ECOG',sub:'Evaluarea capacității funcționale a pacientei'},
  ]
};

function acl(id){
  const all=[...C.obs,...C.gyn];
  return all.find(x=>x.id===id);
}

function setAccent(acc){
  const l=acc+'18';
  const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}};
  document.documentElement.style.setProperty('--acc',acc);
  document.documentElement.style.setProperty('--acc-l',l);
  document.documentElement.style.setProperty('--acc-d',acc);
}

function buildSidebar(){
  const s=document.getElementById('sidebar');
  s.innerHTML=`<div class="sidebar-brand">OB/GYN Suite<span>Calculator clinic</span></div>
  <div class="section-label">Obstetrică</div>
  ${C.obs.map(c=>`<div class="nav-item" style="--acc:${c.acc}" onclick="show('${c.id}')" id="nav-${c.id}"><span class="nav-dot"></span>${c.name}</div>`).join('')}
  <div class="section-label">Ginecologie</div>
  ${C.gyn.map(c=>`<div class="nav-item" style="--acc:${c.acc}" onclick="show('${c.id}')" id="nav-${c.id}"><span class="nav-dot"></span>${c.name}</div>`).join('')}`;
}

function show(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+id);
  if(nav) nav.classList.add('active');
  const c=acl(id);
  setAccent(c.acc);
  document.getElementById('main').innerHTML=`
    <div class="calc-header">
      <div class="calc-icon">${c.icon}</div>
      <div><div class="calc-title">${c.name}</div><div class="calc-sub">${c.sub}</div></div>
    </div>
    ${renders[id]()}`;
}

const today=()=>new Date().toISOString().split('T')[0];
const fmt=d=>new Date(d).toLocaleDateString('ro-RO',{day:'2-digit',month:'long',year:'numeric'});
const hide=id=>{const el=document.getElementById(id);if(el)el.classList.add('hidden')};
const unhide=id=>{const el=document.getElementById(id);if(el)el.classList.remove('hidden')};
function showRes(id,html){const el=document.getElementById(id);el.classList.remove('hidden');el.innerHTML=html}

const renders={
// ---- GA / DPN ----
ga:()=>`
<div class="card">
  <div class="card-title">Metodă</div>
  <div class="fg"><label>Selectează metoda</label>
  <select id="ga-m" onchange="gaMeth()">
    <option value="lmp">Ultima menstruație (LMP)</option>
    <option value="us">Ecografie (LCC)</option>
    <option value="con">Data concepției</option>
  </select></div>
</div>
<div class="card" id="ga-lmp">
  <div class="card-title">Din LMP</div>
  <div class="grid2">
    <div class="fg"><label>Data LMP</label><input type="date" id="ga-lmpd" max="${today()}"></div>
    <div class="fg"><label>Durata ciclului (zile)</label><input type="number" id="ga-cyc" value="28" min="20" max="45"></div>
  </div>
</div>
<div class="card hidden" id="ga-us">
  <div class="card-title">Din ecografie LCC</div>
  <div class="grid2">
    <div class="fg"><label>Data ecografiei</label><input type="date" id="ga-usd" max="${today()}"></div>
    <div class="fg"><label>LCC (mm)</label><input type="number" id="ga-crl" placeholder="ex. 15" min="1" max="84"><span class="hint">Interval valid: 1–84 mm</span></div>
  </div>
</div>
<div class="card hidden" id="ga-con">
  <div class="card-title">Din data concepției</div>
  <div class="fg"><label>Data concepției</label><input type="date" id="ga-cond" max="${today()}"></div>
</div>
<button class="btn" onclick="calcGA()">Calculează</button>
<div class="res hidden" id="ga-r"></div>`,

// ---- EFW ----
efw:()=>`
<div class="card">
  <div class="card-title">Măsurători biometrice</div>
  <div class="grid2">
    <div class="fg"><label>DBP – Diametru biparietal (mm)</label><input type="number" id="ef-bpd" placeholder="ex. 75"></div>
    <div class="fg"><label>PC – Perimetru cranian (mm)</label><input type="number" id="ef-hc" placeholder="ex. 280"></div>
    <div class="fg"><label>PA – Perimetru abdominal (mm)</label><input type="number" id="ef-ac" placeholder="ex. 260"></div>
    <div class="fg"><label>LF – Lungime femur (mm)</label><input type="number" id="ef-fl" placeholder="ex. 55"></div>
  </div>
  <div class="fg" style="margin-top:0.85rem"><label>Formulă</label>
  <select id="ef-form">
    <option value="4">Hadlock 4 (DBP+PC+PA+LF) – recomandat</option>
    <option value="3">Hadlock 3 (PC+PA+LF)</option>
    <option value="2">Hadlock 2 (PA+LF)</option>
  </select></div>
</div>
<button class="btn" onclick="calcEFW()">Calculează</button>
<div class="res hidden" id="efw-r"></div>`,

// ---- BISHOP ----
bishop:()=>`
<div class="card">
  <div class="card-title">Parametrii colului uterin</div>
  <div class="grid2">
    <div class="fg"><label>Dilatație</label><select id="bs-dil">
      <option value="0">0 cm → 0 pct</option><option value="1">1–2 cm → 1 pct</option>
      <option value="2">3–4 cm → 2 pct</option><option value="3">≥5 cm → 3 pct</option>
    </select></div>
    <div class="fg"><label>Ștergere</label><select id="bs-eff">
      <option value="0">0–30% → 0 pct</option><option value="1">40–50% → 1 pct</option>
      <option value="2">60–70% → 2 pct</option><option value="3">≥80% → 3 pct</option>
    </select></div>
    <div class="fg"><label>Prezentație (stație)</label><select id="bs-sta">
      <option value="0">−3 → 0 pct</option><option value="1">−2 → 1 pct</option>
      <option value="2">−1/0 → 2 pct</option><option value="3">+1/+2 → 3 pct</option>
    </select></div>
    <div class="fg"><label>Consistență</label><select id="bs-con">
      <option value="0">Fermă → 0 pct</option><option value="1">Medie → 1 pct</option>
      <option value="2">Moale → 2 pct</option>
    </select></div>
    <div class="fg"><label>Poziție</label><select id="bs-pos">
      <option value="0">Posterioară → 0 pct</option><option value="1">Medie → 1 pct</option>
      <option value="2">Anterioară → 2 pct</option>
    </select></div>
  </div>
</div>
<button class="btn" onclick="calcBishop()">Calculează scorul</button>
<div class="res hidden" id="bs-r"></div>`,

// ---- BPP ----
bpp:()=>`
<div class="card">
  <div class="card-title">Parametrii profilului biofizic (Manning)</div>
  <div style="display:flex;flex-direction:column;gap:0.6rem">
    ${[['bpp-mns','Mișcări respiratorii fetale ≥30 sec în 30 min'],['bpp-mg','Mișcări fetale grosiere (≥3 în 30 min)'],['bpp-ton','Tonus fetal (extensie/flexie activă)'],['bpp-nst','Test non-stress (NST) reactiv'],['bpp-afi','Lichid amniotic (cel puțin un buzunar ≥2 cm)']].map(([id,lbl])=>`
    <label class="chk-row"><input type="checkbox" id="${id}"><span style="flex:1">${lbl}</span><span style="font-size:12px;color:#64748b">2 pct</span></label>`).join('')}
  </div>
</div>
<button class="btn" onclick="calcBPP()">Calculează</button>
<div class="res hidden" id="bpp-r"></div>`,

// ---- AFI ----
afi:()=>`
<div class="card">
  <div class="card-title">Buzunare lichid amniotic – 4 cadrane (cm)</div>
  <div class="grid2">
    <div class="fg"><label>Cadran superior drept (cm)</label><input type="number" id="afi-q1" placeholder="ex. 4.5" step="0.1"></div>
    <div class="fg"><label>Cadran superior stâng (cm)</label><input type="number" id="afi-q2" placeholder="ex. 5.2" step="0.1"></div>
    <div class="fg"><label>Cadran inferior drept (cm)</label><input type="number" id="afi-q3" placeholder="ex. 3.8" step="0.1"></div>
    <div class="fg"><label>Cadran inferior stâng (cm)</label><input type="number" id="afi-q4" placeholder="ex. 4.1" step="0.1"></div>
  </div>
  <div class="fg" style="margin-top:0.75rem"><label>Vârstă gestațională (săptămâni)</label><input type="number" id="afi-ga" placeholder="ex. 32" min="16" max="42"></div>
</div>
<button class="btn" onclick="calcAFI()">Calculează</button>
<div class="res hidden" id="afi-r"></div>`,

// ---- VBAC ----
vbac:()=>`
<div class="card">
  <div class="card-title">Date materne</div>
  <div class="grid2">
    <div class="fg"><label>Vârstă (ani)</label><input type="number" id="vb-age" placeholder="ex. 32"></div>
    <div class="fg"><label>IMC la internare (kg/m²)</label><input type="number" id="vb-bmi" placeholder="ex. 26"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Antecedente obstetricale</div>
  <div class="grid2">
    <div class="fg"><label>Naștere vaginală anterioară?</label><select id="vb-vd">
      <option value="0">Nu</option><option value="1">Da, înainte de cezariană</option><option value="2">Da, după cezariană (VBAC)</option>
    </select></div>
    <div class="fg"><label>Indicația cezarianei anterioare</label><select id="vb-ind">
      <option value="nonrec">Non-recurentă (ex. prezentație, suferință fetală)</option>
      <option value="rec">Recurentă (ex. DCP, stagnare dilataţie)</option>
    </select></div>
    <div class="fg"><label>Nr. cezariene anterioare</label><select id="vb-ncs"><option value="1">1</option><option value="2">2+</option></select></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Sarcina actuală</div>
  <div class="grid2">
    <div class="fg"><label>Indicație recurentă prezentă?</label><select id="vb-rec"><option value="0">Nu</option><option value="1">Da</option></select></div>
  </div>
</div>
<button class="btn" onclick="calcVBAC()">Calculează</button>
<div class="res hidden" id="vb-r"></div>`,

// ---- HELLP ----
hellp:()=>`
<div class="card">
  <div class="card-title">Valori de laborator</div>
  <div class="grid2">
    <div class="fg"><label>LDH (U/L)</label><input type="number" id="hl-ldh" placeholder="ex. 600"></div>
    <div class="fg"><label>AST (U/L)</label><input type="number" id="hl-ast" placeholder="ex. 70"></div>
    <div class="fg"><label>ALT (U/L)</label><input type="number" id="hl-alt" placeholder="ex. 60"></div>
    <div class="fg"><label>Trombocite (×10³/μL)</label><input type="number" id="hl-plt" placeholder="ex. 90"></div>
    <div class="fg"><label>Bilirubină totală (mg/dL)</label><input type="number" id="hl-bil" placeholder="ex. 1.2" step="0.1"></div>
    <div class="fg"><label>Hemoglobină (g/dL)</label><input type="number" id="hl-hb" placeholder="ex. 9.5" step="0.1"></div>
  </div>
</div>
<button class="btn" onclick="calcHELLP()">Evaluează</button>
<div class="res hidden" id="hl-r"></div>`,

// ---- SHOCK INDEX / qSOFA ----
shock:()=>`
<div class="card">
  <div class="card-title">Parametrii vitali</div>
  <div class="grid2">
    <div class="fg"><label>Frecvență cardiacă (bpm)</label><input type="number" id="sh-hr" placeholder="ex. 110"></div>
    <div class="fg"><label>TA sistolică (mmHg)</label><input type="number" id="sh-sbp" placeholder="ex. 90"></div>
    <div class="fg"><label>Frecvență respiratorie (/min)</label><input type="number" id="sh-rr" placeholder="ex. 22"></div>
    <div class="fg"><label>Scor Glasgow (GCS)</label><input type="number" id="sh-gcs" placeholder="ex. 14" min="3" max="15"></div>
    <div class="fg"><label>SpO₂ (%)</label><input type="number" id="sh-spo2" placeholder="ex. 95"></div>
    <div class="fg"><label>Temperatură (°C)</label><input type="number" id="sh-temp" placeholder="ex. 38.2" step="0.1"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Date biologice (opțional – SOFA)</div>
  <div class="grid3">
    <div class="fg"><label>Creatinină (mg/dL)</label><input type="number" id="sh-cr" placeholder="ex. 1.2" step="0.1"></div>
    <div class="fg"><label>Bilirubină (mg/dL)</label><input type="number" id="sh-bil" placeholder="ex. 1.0" step="0.1"></div>
    <div class="fg"><label>Trombocite (×10³/μL)</label><input type="number" id="sh-plt" placeholder="ex. 150"></div>
  </div>
</div>
<button class="btn" onclick="calcShock()">Calculează</button>
<div class="res hidden" id="sh-r"></div>`,

// ---- PPH ----
pph:()=>`
<div class="card">
  <div class="card-title">Factori de risc – bifează tot ce se aplică</div>
  <div style="display:flex;flex-direction:column;gap:0.5rem">
    ${[
      ['pp-ppa','Placenta praevia / jos inserată','br'],
      ['pp-ppc','Suspiciune placenta accreta/increta/percreta','br'],
      ['pp-phx','Antecedente de HPP','br'],
      ['pp-pcs','Operație cezariană/chirurgie uterină anterioară','bo'],
      ['pp-mult','Sarcină multiplă','bo'],
      ['pp-mac','Macrosomie fetală (EFW >4000g)','bo'],
      ['pp-poly','Polihidramnios','bo'],
      ['pp-gmp','Grandimultipară (≥5 nașteri)','bo'],
      ['pp-fib','Fibroame uterine','bo'],
      ['pp-cho','Corioamniotită','bo'],
      ['pp-mg','Sulfat de magneziu','by'],
      ['pp-oxt','Oxitocin prelungit','by'],
      ['pp-lng','Travaliu prelungit (>12h faza activă)','by'],
      ['pp-anm','Anemie antepartum (Hb <10 g/dL)','by'],
    ].map(([id,lbl,cls])=>`<label class="chk-row"><input type="checkbox" id="${id}" style="accent-color:var(--acc)"><span style="flex:1">${lbl}</span><span class="badge ${cls}" style="font-size:10px">${cls==='br'?'ÎNALT':cls==='bo'?'MEDIU':'SCĂZUT'}</span></label>`).join('')}
  </div>
</div>
<button class="btn" onclick="calcPPH()">Calculează riscul</button>
<div class="res hidden" id="pp-r"></div>`,

// ---- PREECLAMPSIE ----
preeclampsia:()=>`
<div class="card">
  <div class="card-title">Factori de risc (trimestrul I)</div>
  <div class="grid2">
    <div class="fg"><label>Vârstă maternă (ani)</label><input type="number" id="pe-age" placeholder="ex. 35"></div>
    <div class="fg"><label>IMC pre-sarcină (kg/m²)</label><input type="number" id="pe-bmi" placeholder="ex. 28"></div>
    <div class="fg"><label>TA medie (mmHg)</label><input type="number" id="pe-map" placeholder="ex. 85"></div>
    <div class="fg"><label>PAPP-A MoM</label><input type="number" id="pe-pappa" placeholder="ex. 0.8" step="0.01"></div>

// ============ CALCULATION FUNCTIONS ============

function gaMeth(){
  const m=document.getElementById('ga-m').value;
  document.getElementById('ga-lmp').classList.toggle('hidden',m!=='lmp');
  document.getElementById('ga-us').classList.toggle('hidden',m!=='us');
  document.getElementById('ga-con').classList.toggle('hidden',m!=='con');
}

function calcGA(){
  const m=document.getElementById('ga-m').value;
  let edd,gaW,gaD,now=new Date();now.setHours(0,0,0,0);
  if(m==='lmp'){
    const v=document.getElementById('ga-lmpd').value;if(!v)return alert('Introduceți data LMP.');
    const lmp=new Date(v),cyc=parseInt(document.getElementById('ga-cyc').value)||28;
    edd=new Date(lmp);edd.setDate(lmp.getDate()+280+(cyc-28));
    const d=Math.floor((now-lmp)/864e5);gaW=Math.floor(d/7);gaD=d%7;
  }else if(m==='us'){
    const ud=document.getElementById('ga-usd').value,crl=parseFloat(document.getElementById('ga-crl').value);
    if(!ud||isNaN(crl))return alert('Introduceți data ecografiei și LCC.');
    const gaAtUs=Math.round(8.052*Math.pow(crl,0.5)+23.73);
    const uDate=new Date(ud);edd=new Date(uDate);edd.setDate(uDate.getDate()+(280-gaAtUs));
    const tot=gaAtUs+Math.floor((now-uDate)/864e5);gaW=Math.floor(tot/7);gaD=tot%7;
  }else{
    const cd=document.getElementById('ga-cond').value;if(!cd)return alert('Introduceți data concepției.');
    const c=new Date(cd);edd=new Date(c);edd.setDate(c.getDate()+266);
    const tot=Math.floor((now-c)/864e5)+14;gaW=Math.floor(tot/7);gaD=tot%7;
  }
  const trim=gaW<14?'Trimestrul I':gaW<28?'Trimestrul II':'Trimestrul III';
  const zile=Math.max(0,Math.floor((edd-now)/864e5));
  showRes('ga-r',`<div class="res-lbl">Data probabilă a nașterii</div><div class="res-main">${fmt(edd)}</div>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${gaW}s ${gaD}z</div><div class="res-lbl2">Vârstă gestațională</div></div>
      <div class="res-item"><div class="res-val">${zile}</div><div class="res-lbl2">Zile rămase</div></div>
      <div class="res-item"><div class="res-val">${trim}</div><div class="res-lbl2">Trimestru</div></div>
    </div>`);
}

function calcEFW(){
  const f=document.getElementById('ef-form').value;
  const bpd=parseFloat(document.getElementById('ef-bpd').value)/10;
  const hc=parseFloat(document.getElementById('ef-hc').value)/10;
  const ac=parseFloat(document.getElementById('ef-ac').value)/10;
  const fl=parseFloat(document.getElementById('ef-fl').value)/10;
  let log;
  if(f==='4'){if([bpd,hc,ac,fl].some(isNaN))return alert('Completați toate cele 4 măsurători.');log=1.3596+0.0064*hc+0.0424*ac+0.174*fl+0.00061*bpd*ac-0.00386*ac*fl;}
  else if(f==='3'){if([hc,ac,fl].some(isNaN))return alert('Completați PC, PA și LF.');log=1.326-0.00326*ac*fl+0.0107*hc+0.0438*ac+0.158*fl;}
  else{if([ac,fl].some(isNaN))return alert('Completați PA și LF.');log=1.304+0.05281*ac+0.1938*fl-0.004*ac*fl;}
  const efw=Math.round(Math.pow(10,log));
  const lbs=(efw/453.592).toFixed(1);
  const s=efw<2500?['<10 percentilă – posibil RCF','br']:efw<=4000?['Greutate în limite normale','bg']:['Macrosomie suspectată (>4000g)','bo'];
  showRes('efw-r',`<div class="res-lbl">Greutate fetală estimată</div><div class="res-main">${efw.toLocaleString('ro-RO')} g &nbsp;|&nbsp; ${lbs} lbs</div>

}

function calcVBAC(){
  const age=parseFloat(document.getElementById('vb-age').value);
  const bmi=parseFloat(document.getElementById('vb-bmi').value);
  if(isNaN(age)||isNaN(bmi))return alert('Introduceți vârsta și IMC.');
  const vd=parseInt(document.getElementById('vb-vd').value);
  const ind=document.getElementById('vb-ind').value;
  const ncs=parseInt(document.getElementById('vb-ncs').value);
  const rec=parseInt(document.getElementById('vb-rec').value);
  let logit=3.762-0.067*age-0.047*bmi+(vd===1?0.882:vd===2?1.364:0)+(ind==='nonrec'?0.576:0)+(ncs===1?0:-0.416)-(rec?0.533:0);
  const prob=Math.round(100/(1+Math.exp(-logit)));
  const[cls,note]=prob>=70?['bg','Candidată favorabilă pentru TOLAC. Discutați beneficiile și riscurile cu pacienta.']:prob>=50?['by','Probabilitate moderată. Consiliere individualizată necesară.']:['br','Probabilitate scăzută. Luați în considerare cezariana electivă repetată.'];
  showRes('vb-r',`<div class="res-lbl">Probabilitate naștere vaginală (TOLAC)</div><div class="res-main">${prob}%</div>
    <span class="badge ${cls}">${prob>=70?'Favorabilă':prob>=50?'Moderată':'Scăzută'}</span>
    <div class="res-note" style="margin-top:8px">${note}</div>
    <div class="res-note" style="margin-top:6px;font-size:12px;color:#94a3b8">Bazat pe Grobman et al. (2007). Estimare statistică – judecata clinică rămâne esențială.</div>`);
}

function calcHELLP(){
  const ldh=parseFloat(document.getElementById('hl-ldh').value);
  const ast=parseFloat(document.getElementById('hl-ast').value);
  const alt=parseFloat(document.getElementById('hl-alt').value);
  const plt=parseFloat(document.getElementById('hl-plt').value);
  const bil=parseFloat(document.getElementById('hl-bil').value);
  const hb=parseFloat(document.getElementById('hl-hb').value);
  if([ldh,ast,plt].some(isNaN))return alert('Completați LDH, AST și trombocite.');
  const hemolyza=ldh>600||(bil>1.2)||(hb<10);
  const enzime=(ast>70)||((!isNaN(alt))&&alt>40);
  const trombopenie=plt<100;
  let cls='',msg='',badge='';
  if(hemolyza&&enzime&&trombopenie){cls='br';badge='HELLP complet';msg='Criterii complete HELLP. Internare imediată, stabilizare maternă, naștere în funcție de vârsta gestațională.';}
  else if((hemolyza&&enzime)||(hemolyza&&trombopenie)||(enzime&&trombopenie)){cls='bo';badge='HELLP parțial';msg='Criterii parțiale prezente. Monitorizare intensivă, repetare analize la 6–12h.';}
  else{cls='bg';badge='Criterii HELLP absente';msg='Criteriile de diagnostic HELLP nu sunt îndeplinite la moment. Continuați monitorizarea clinică și biologică.';}
  showRes('hl-r',`<div class="res-lbl">Evaluare HELLP</div>
    <span class="badge ${cls}">${badge}</span>
    <div class="res-grid">
      <div class="res-item"><div class="res-val" style="color:${hemolyza?'#dc2626':'#16a34a'}">${hemolyza?'Da':'Nu'}</div><div class="res-lbl2">Hemoliză</div></div>
      <div class="res-item"><div class="res-val" style="color:${enzime?'#dc2626':'#16a34a'}">${enzime?'Crescute':'Normale'}</div><div class="res-lbl2">Enzime hepatice</div></div>
      <div class="res-item"><div class="res-val" style="color:${trombopenie?'#dc2626':'#16a34a'}">${trombopenie?'Da':'Nu'}</div><div class="res-lbl2">Trombopenie</div></div>
    </div>
    <div class="res-note" style="margin-top:8px">${msg}</div>`);
}

function calcShock(){
  const hr=parseFloat(document.getElementById('sh-hr').value);
  const sbp=parseFloat(document.getElementById('sh-sbp').value);
  const rr=parseFloat(document.getElementById('sh-rr').value);
  const gcs=parseFloat(document.getElementById('sh-gcs').value);
  if(isNaN(hr)||isNaN(sbp))return alert('Completați frecvența cardiacă și TA sistolică.');
  const si=(hr/sbp).toFixed(2);
  const siClass=si<0.7?['Normal','bg']:si<1?['Risc moderat','by']:si<1.4?['Risc înalt de șoc','bo']:['Șoc sever','br'];
  let qsofa=0;
  if(!isNaN(rr)&&rr>=22)qsofa++;
  if(!isNaN(gcs)&&gcs<15)qsofa++;
  if(sbp<=100)qsofa++;
  const qsofaClass=qsofa>=2?['Risc crescut de disfuncție de organ','br']:qsofa===1?['Monitorizare atentă','by']:['Risc scăzut','bg'];
  showRes('sh-r',`<div class="res-lbl">Indice de Șoc & qSOFA</div>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${si}</div><div class="res-lbl2">Indice de șoc (IS)</div></div>

}

function calcPPH(){

  const m=['pp-pcs','pp-mult','pp-mac','pp-poly','pp-gmp','pp-fib','pp-cho'].filter(id=>document.getElementById(id).checked).length;

  else if(m>=2||(m>=1&&l>=1)){level='RISC MEDIU';cls='bo';rec='Vigilență sporită. Acces venos ×1, determinare grup sanguin, management activ al perioadei a 3-a. Perfuzie oxitocin pregătită. Comunicați echipei.';}
  else if(m===1||l>=2){level='RISC SCĂZUT-MEDIU';cls='by';rec='Precauții standard cu management activ al delivrenței. Documentați și comunicați factorii de risc tuturor membrilor echipei.';}
  else{level='RISC SCĂZUT';cls='bg';rec='Îngrijire de rutină cu management activ al perioadei a 3-a (oxitocin 10 UI i.m. după nașterea umărului anterior).';}

function calcPE(){

  const bmi=parseFloat(document.getElementById('pe-bmi').value)||0;

  const nRisk=checks.reduce((a,id)=>a+(document.getElementById(id).checked?1:0),0);
  let score=0;
  if(age>35)score+=1;if(bmi>30)score+=1;if(map>90)score+=1;if(pappa<0.5)score+=2;

  if(prevPE)score+=3;
  score+=nRisk;
  const[level,cls,note]=score>=6?['RISC ÎNALT','br','Aspirina 150 mg/zi (11–36 săpt.), monitorizare TA și proteină urinară la 2 săptămâni, ecografii seriate.']: score>=3?['RISC INTERMEDIAR','bo','Aspirina 100–150 mg/zi discutată. Monitorizare tensiune arterială. Repetare screening la 20 săpt.']:['RISC SCĂZUT','bg','Urmărire standard. Informați pacienta despre simptomele de alarmă.'];

  else if(ind==='np'){loading='4 g i.v. în 30 min';maintenance='1 g/h i.v. până la naștere sau max. 24h';notes='Neuroprotecție fetală la <32 săptămâni. Oprire după naștere.';}
  else{loading='4 g i.v. în 20 min';maintenance='2–3 g/h i.v., titrare după răspuns';notes='Tocoliză de scurtă durată. Monitorizați TA și FCC maternă continuu.';}

}

function calcTwin(){
  const chor=document.getElementById('tw-chor').value;
  const ga=parseFloat(document.getElementById('tw-ga').value);
  const efwA=parseFloat(document.getElementById('tw-efwa').value);
  const efwB=parseFloat(document.getElementById('tw-efwb').value);
  let disc='N/A',discCls='bg',discNote='';
  if(!isNaN(efwA)&&!isNaN(efwB)&&efwA>0&&efwB>0){
    const pct=Math.round(Math.abs(efwA-efwB)/Math.max(efwA,efwB)*100);
    disc=pct+'%';
    discCls=pct>=25?'br':pct>=20?'bo':pct>=15?'by':'bg';
    discNote=pct>=25?'Discordanță severă (≥25%) – risc crescut TTTS/sRAIU. Evaluare urgentă.':pct>=20?'Discordanță semnificativă – monitorizare Doppler la 2 săptămâni.':pct>=15?'Discordanță ușoară – urmărire ecografică săptămânală.':'Creștere concordantă.';
  }
  const chLabel=chor==='dc'?'DCDA':chor==='mc'?'MCDA':'MCMA';
  const monit=chor==='dc'?'Ecografii la 4 săptămâni până la 28s, apoi bilunar.':chor==='mc'?'Ecografii bilunar de la 16s (TTTS screening).':'Monitorizare săptămânală de la 16s (risc TTTS și cordon).';
  const nasc=chor==='dc'?'38s':chor==='mc'?'36–37s':'32–34s';
  showRes('tw-r',`<div class="res-lbl">Sarcină gemelară ${chLabel} – ${!isNaN(ga)?ga+'s':'-'}</div>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${chLabel}</div><div class="res-lbl2">Corionicitate</div></div>
      <div class="res-item"><div class="res-val"><span class="badge ${discCls}">${disc}</span></div><div class="res-lbl2">Discordanță EFW</div></div>
      <div class="res-item"><div class="res-val">${nasc}</div><div class="res-lbl2">Naștere recomandată</div></div>
    </div>
    ${discNote?`<div class="res-note" style="margin-top:8px">${discNote}</div>`:''}
    <div class="res-note" style="margin-top:8px"><strong>Monitorizare:</strong> ${monit}</div>`);
}

function calcRMI(){
  const ca125=parseFloat(document.getElementById('rm-ca125').value);
  const M=parseInt(document.getElementById('rm-meno').value);
  if(isNaN(ca125))return alert('Introduceți valoarea CA-125.');

  const cnt=ids.reduce((a,id)=>a+(document.getElementById(id).checked?1:0),0);
  const U=cnt===0?0:cnt===1?1:3;
  const rmi=Math.round(U*M*ca125);
  const[level,cls,note]=rmi>=250?['RISC ÎNALT','br','RMI ≥250: trimitere urgentă la oncologie ginecologică. Nu operați în spitale fără oncochirurg.']:rmi>=200?['RISC MODERAT-ÎNALT','bo','RMI 200–249: discutați cazul în echipă multidisciplinară.']:rmi>=100?['RISC MODERAT','by','RMI 100–199: evaluare suplimentară recomandată (CT, PET sau laparoscopie diagnostică).']:['RISC SCĂZUT','bg','RMI <100: urmărire sau intervenție laparoscopică în centru standard.'];
  showRes('rm-r',`<div class="res-lbl">RMI (Risk of Malignancy Index)</div><div class="res-main">${rmi}</div>
    <span class="badge ${cls}">${level}</span>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${U}</div><div class="res-lbl2">Scor ecografic (U)</div></div>
      <div class="res-item"><div class="res-val">${M}</div><div class="res-lbl2">Menopauză (M)</div></div>

function calcROMA(){
  const he4=parseFloat(document.getElementById('ro-he4').value);
  const ca125=parseFloat(document.getElementById('ro-ca125').value);
  const meno=document.getElementById('ro-meno').value;
  if(isNaN(he4)||isNaN(ca125))return alert('Completați HE4 și CA-125.');
  let pi;
  if(meno==='pre') pi=-12.0+2.38*Math.log(he4)+0.0626*Math.log(ca125);
  else pi=-8.09+1.04*Math.log(he4)+0.732*Math.log(ca125);
  const roma=Math.round(Math.exp(pi)/(1+Math.exp(pi))*100);
  const cutoff=meno==='pre'?11.4:29.9;
  const high=roma>=cutoff;
  showRes('ro-r',`<div class="res-lbl">Scor ROMA (${meno==='pre'?'Premenopauză':'Postmenopauză'})</div><div class="res-main">${roma}%</div>
    <span class="badge ${high?'br':'bg'}">${high?'Risc ÎNALT de epiteliu malign':'Risc SCĂZUT de malignitate'}</span>
    <div class="res-note" style="margin-top:8px">Prag: ${cutoff}% (${meno==='pre'?'pre':'post'}menopauză) · ROMA calculat: ${roma}%</div>
    <div class="res-note" style="font-size:12px;color:#94a3b8;margin-top:4px">Combinat cu RMI și examen clinic pentru decizie optimă.</div>`);
}

function calcBMI(){
  const wt=parseFloat(document.getElementById('bm-wt').value);
  const ht=parseFloat(document.getElementById('bm-ht').value)/100;
  const age=parseFloat(document.getElementById('bm-age').value)||30;
  if(isNaN(wt)||isNaN(ht))return alert('Introduceți greutatea și înălțimea.');
  const bmi=(wt/(ht*ht)).toFixed(1);
  const bsa=(Math.sqrt((wt*(ht*100))/3600)).toFixed(2);
  const ibw=(22.5*(ht*ht)).toFixed(1);
  const[cls,label]=bmi<18.5?['bb','Subponderal']:bmi<25?['bg','Normal']:bmi<30?['by','Supraponderal']:bmi<35?['bo','Obezitate grad I']:bmi<40?['bo','Obezitate grad II']:['br','Obezitate grad III (morbidă)'];
  showRes('bm-r',`<div class="res-lbl">IMC & Suprafață Corporală</div>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${bmi}</div><div class="res-lbl2">IMC (kg/m²)</div></div>
      <div class="res-item"><div class="res-val">${bsa} m²</div><div class="res-lbl2">BSA (Mosteller)</div></div>
      <div class="res-item"><div class="res-val">${ibw} kg</div><div class="res-lbl2">Greutate ideală</div></div>
    </div>
    <span class="badge ${cls}" style="margin-top:8px">${label}</span>`);
}

function calcMRS(){

    <span class="badge ${cls}">${level}</span>

function calcEndoCa(){
  const age=parseFloat(document.getElementById('ec-age').value)||50;
  const bmi=parseFloat(document.getElementById('ec-bmi').value)||25;
  const checks=['ec-dm','ec-htn','ec-nullip','ec-meno','ec-meno2','ec-pcos','ec-tam','ec-lynch','ec-hrt','ec-bleed'];
  const nR=checks.reduce((a,id)=>a+(document.getElementById(id).checked?1:0),0);
  let score=0;
  if(age>55)score+=3;else if(age>45)score+=1;
  if(bmi>40)score+=4;else if(bmi>35)score+=3;else if(bmi>30)score+=2;
  const lynch=document.getElementById('ec-lynch').checked;
  const bleed=document.getElementById('ec-bleed').checked;
  if(lynch)score+=5;if(bleed)score+=4;
  score+=nR;
  const[level,cls,note]=score>=8?['RISC ÎNALT','br','Biopsia endometrului indicată. Ecografie transvaginală cu măsurarea grosimii endometrului. Consult oncologic ginecologic.']:score>=4?['RISC MODERAT','bo','Investigații suplimentare recomandate (ecografie TV, histeroscopie dacă indicată). Monitorizare anuală.']:['RISC SCĂZUT','bg','Screening standard. Informați pacienta despre simptomele de alarmă (metroragie postmenopauză).'];
  showRes('ec-r',`<div class="res-lbl">Risc cancer endometrial</div><div class="res-main">${level}</div>
    <span class="badge ${cls}">Scor orientativ: ${score}</span>
    <div class="res-note" style="margin-top:8px">${note}</div>
    <div class="res-note" style="font-size:12px;color:#94a3b8;margin-top:4px">Model orientativ de stratificare clinică. Nu înlocuiește evaluarea histopatologică.</div>`);
}

function calcOvRes(){
  const amh=parseFloat(document.getElementById('ov-amh').value);
  const fsh=parseFloat(document.getElementById('ov-fsh').value);
  const e2=parseFloat(document.getElementById('ov-e2').value);
  const afc=parseFloat(document.getElementById('ov-afc').value);
  const age=parseFloat(document.getElementById('ov-age').value)||35;
  let results=[];
  if(!isNaN(amh)){const[l,c]=amh<0.5?['Rezervă diminuată sever','br']:amh<1.1?['Rezervă scăzută','bo']:amh<=3.5?['Rezervă normală','bg']:['Rezervă crescută (risc SHO)','by'];results.push(`<div class="res-item"><div class="res-val"><span class="badge ${c}" style="font-size:12px">${l}</span></div><div class="res-lbl2">AMH: ${amh} ng/mL</div></div>`);}
  if(!isNaN(fsh)){const[l,c]=fsh>20?['FSH sever crescut','br']:fsh>10?['FSH crescut','bo']:fsh>=3?['FSH normal','bg']:['FSH scăzut','by'];results.push(`<div class="res-item"><div class="res-val"><span class="badge ${c}" style="font-size:12px">${l}</span></div><div class="res-lbl2">FSH: ${fsh} mUI/mL</div></div>`);}
  if(!isNaN(afc)){const[l,c]=afc<4?['AFC diminuat sever','br']:afc<7?['AFC scăzut','bo']:afc<=15?['AFC normal','bg']:['AFC crescut (risc SHO)','by'];results.push(`<div class="res-item"><div class="res-val"><span class="badge ${c}" style="font-size:12px">${l}</span></div><div class="res-lbl2">AFC: ${afc} foliculi</div></div>`);}
  if(!results.length)return alert('Introduceți cel puțin un marker.');
  showRes('ov-r',`<div class="res-lbl">Interpretare rezervă ovariană (vârstă: ${age} ani)</div>
    <div class="res-grid">${results.join('')}</div>
    <div class="res-note" style="margin-top:8px;font-size:12px;color:#94a3b8">Valorile de referință variază între laboratoare. Interpretare în context clinic complet.</div>`);
}

function calcRASRM(){
  const ids=['ra-ps','ra-pd','ra-osr','ra-osl','ra-oadr','ra-oadl','ra-fdr','ra-fdl','ra-pod'];
  const sc=ids.reduce((a,id)=>a+parseInt(document.getElementById(id).value),0);
  const[stage,cls,note]=sc<=5?['Stadiu I – Minimă (1–5 pct)','bg','Endometrioză minimă. De obicei incidentalomă sau depozite superficiale izolate.']:sc<=15?['Stadiu II – Ușoară (6–15 pct)','by','Endometrioză ușoară. Leziuni superficiale fără sau cu aderențe minime.']:sc<=40?['Stadiu III – Moderată (16–40 pct)','bo','Endometrioză moderată cu endometrioame și/sau aderențe multiple.']:['Stadiu IV – Severă (>40 pct)','br','Endometrioză severă. Aderențe dense, obliterare Douglas, endometrioame mari.'];
  showRes('ra-r',`<div class="res-lbl">Clasificare rASRM</div><div class="res-main">${sc} puncte</div>
    <span class="badge ${cls}">${stage}</span>
    <div class="res-note" style="margin-top:8px">${note}</div>
    <div class="res-note" style="font-size:12px;color:#94a3b8;margin-top:4px">Scorul rASRM nu corelează direct cu durerea sau fertilitatea. Enzian/DIE pentru boala profundă.</div>`);
}

function calcEnzian(){
  const a=document.getElementById('ez-a').value,b=document.getElementById('ez-b').value,c=document.getElementById('ez-c').value,f=document.getElementById('ez-f').value;
  const oma=document.getElementById('ez-oma').value,adh=parseInt(document.getElementById('ez-adh').value);
  const tot=parseInt(a)+parseInt(b)+parseInt(c)+parseInt(f)+adh;
  const[severity,cls,note]=tot===0?['Fără DIE detectată','bg','Nicio endometrioză profundă identificată în compartimentele evaluate.']:tot<=3?['DIE ușoară','by','Implicare limitată. Management conservator sau medicamentos poate fi adecvat.']:tot<=7?['DIE moderată','bo','Boală multicompartimentală. Planificare chirurgicală cu echipă multidisciplinară recomandată.']:['DIE severă','br','Boală extinsă. Abord chirurgical multidisciplinar obligatoriu (chirurgie colorectală, urologie).'];
  const omaLbl=oma==='none'?'Absent':oma==='bilateral'?'Bilateral':oma==='right'?'Drept':'Stâng';
  showRes('ez-r',`<div class="res-lbl">Clasificare Enzian (DIE)</div><div class="res-main">A${a} B${b} C${c} F${f}</div>
    <span class="badge ${cls}">${severity}</span>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">A${a}</div><div class="res-lbl2">Rectovaginal</div></div>
      <div class="res-item"><div class="res-val">B${b}</div><div class="res-lbl2">Uterosacrate</div></div>
      <div class="res-item"><div class="res-val">C${c}</div><div class="res-lbl2">Rect/sigmoid</div></div>
      <div class="res-item"><div class="res-val">F${f}</div><div class="res-lbl2">Alte regiuni</div></div>
      <div class="res-item"><div class="res-val">${omaLbl}</div><div class="res-lbl2">Endometriom</div></div>
    </div>
    <div class="res-note" style="margin-top:8px">${note}</div>`);
}

function calcPBAC(){
  const pads=parseFloat(document.getElementById('pb-pads').value)||0;
  const tamp=parseFloat(document.getElementById('pb-tamp').value)||0;
  const cls=parseFloat(document.getElementById('pb-cls').value)||0;
  const cll=parseFloat(document.getElementById('pb-cll').value)||0;
  const spot=parseFloat(document.getElementById('pb-spot').value)||0;
  const score=Math.round(pads*1+tamp*1+cls*1+cll*5+spot*0.5);
  const[level,cls2,note]=score>=100?['Menoragie semnificativă (PBAC ≥100)','br','Investigații indicate: hemogramă, feritină, ecografie TV, histeroscopie. Discutați opțiuni terapeutice.']:score>=50?['Sângerare moderată (50–99)','bo','Monitorizare și investigații în funcție de simptomele asociate (anemie, impact pe calitatea vieții).']:['Sângerare în limite acceptabile (<50)','bg','PBAC sub pragul de menoragie. Reevaluare dacă simptomele se agravează.'];
  showRes('pb-r',`<div class="res-lbl">Scor PBAC</div><div class="res-main">${score} puncte</div>
    <span class="badge ${cls2}">${level}</span>
    <div class="res-grid">
      <div class="res-item"><div class="res-val">${pads}</div><div class="res-lbl2">Absorbante</div></div>
      <div class="res-item"><div class="res-val">${tamp}</div><div class="res-lbl2">Tampoane</div></div>
      <div class="res-item"><div class="res-val">${cls+cll}</div><div class="res-lbl2">Cheaguri</div></div>
    </div>
    <div class="res-note" style="margin-top:8px">${note}</div>`);
}

function calcECOG(){
  const sel=document.querySelector('input[name="ecog"]:checked');
  if(!sel)return alert('Selectați un status ECOG.');
  const v=parseInt(sel.value);
  const labels=['Activ complet – fără restricții','Ambulatoriu – muncă ușoară posibilă','Ambulatoriu – nu poate munci','Îngrijire limitată – >50% în pat','Complet dependent','Decedat'];
  const cls=['bg','bg','by','bo','br','br'];
  const notes=['Pacienta tolereaza toate liniile de tratament. Prognostic favorabil.',
    'Toleranță bună la chimioterapie standard.',
    'Tratament cu intenție paliativă preferat. Monitorizare atentă a toleranței.',
    'Tratament sistemic cu risc crescut. Individualizați decizia terapeutică.',
    'Tratamentul agresiv contraindicat. Îngrijiri paliative.',
    ''];
  showRes('eg-r',`<div class="res-lbl">Status performanță ECOG</div><div class="res-main">ECOG ${v}</div>
    <span class="badge ${cls[v]}">${labels[v]}</span>
    <div class="res-note" style="margin-top:8px">${notes[v]}</div>`);
}

buildSidebar();
show('ga');
</script>
